# Classifier verdict definitions.
#
# Each classifier has a preamble, an ordered list of verdicts, and a footer.
# YAML order = check priority order.
#
# To add a new verdict: add a block under the right classifier's verdicts
# list, rebuild, and restart. The prompt, parser, and rejection message
# are all generated from this file automatically.
#
# Removed verdicts (and why):
# - FICTIONAL: ~40-50% false positive rate. Rejected real past events as
#   "hypothetical." The agent model's own judgment handles this better.
# - MOOD_NOT_FACT: mood tracking system removed (in junk drawer).
# - EXTERNAL: overlapped with FICTIONAL, removed with it.
# - INFERRED: memory agent reads raw conversation, so reasonable
#   summarization is always acceptable.

classifiers:
  fact:
    preamble: >-
      You are a quality gate for a personal chatbot's memory system.
      A fact has been proposed for permanent storage. Evaluate it against
      the following criteria and return the FIRST matching verdict.
    write_types:
      - fact
      - self_fact
    verdicts:
      - name: LOW_VALUE
        description: >-
          Is the fact too vague, generic, or obvious to be worth permanent
          storage? Would it add meaningful context in future conversations?
        examples:
          - '"User enjoys reading and finds it a pleasant activity" (says nothing specific)'
          - '"User had a conversation today" (trivially obvious)'
          - '"User sent a message about their day" (meta-observation with no content)'
          - '"User is interested in technology" (too broad to be useful)'
        note: >-
          specificity is what matters. "User enjoys short, surreal books
          like Piranesi" is SAVE — that's actionable.
        rejection:
          default_detail: this fact is too vague or generic to be worth saving
          suffix: >-
            Facts should capture specific, meaningful information that
            couldn't be inferred from conversation history.

      - name: SAVE
        description: >-
          The fact is real, specific, useful, and actually stated or
          clearly implied by the user.
    footer: |-
      Respond with exactly one verdict on a single line. Optionally add a brief explanation after the verdict.
      Examples: "SAVE", "LOW_VALUE — too vague to be actionable"
