name: update_mood
description: >-
  Update the most recent mood entry when {{user}}'s emotional state has
  shifted but a new entry was recently logged. This overwrites the previous
  rating and note, keeping the chart clean while tracking genuine changes.
  Use instead of log_mood when a mood was logged in the last 30 minutes
  but the emotional tone has meaningfully shifted. Do NOT use for minor
  wording tweaks.
hot: false
category: mood
parameters:
  type: object
  properties:
    rating:
      type: integer
      description: "New mood rating: 1=bad, 2=rough, 3=meh/neutral, 4=good, 5=great"
      minimum: 1
      maximum: 5
    note:
      type: string
      description: "Brief context for the updated rating"
  required:
    - rating
    - note
trace:
  emoji: "\U0001F504"
  format: "{{.rating}}/5 — {{.note | truncate 80 | escape}}"
