name: todoist_update
description: >-
  Update an existing Todoist task. Use when {{user}} wants to change a task's
  title, due date, priority, or description. Requires the task ID from todoist_list.
hint: "update a Todoist task"
hot: false
category: todoist
parameters:
  type: object
  properties:
    task_id:
      type: string
      description: "The Todoist task ID to update. Get this from todoist_list."
    content:
      type: string
      description: "New task title. Omit to keep the current title."
    description:
      type: string
      description: "New task description/notes. Omit to keep the current description."
    due_string:
      type: string
      description: >-
        New due date in natural language ('tomorrow', 'next friday', 'no date'
        to clear). Omit to keep the current due date.
    priority:
      type: number
      description: "New priority: 1 (normal) to 4 (urgent). Omit to keep current."
      minimum: 1
      maximum: 4
  required:
    - task_id
trace:
  emoji: "✏️"
  format: "ID={{.task_id}}"
