name: save_memory
agent: memory
hint: "save a new memory about the user"
description: >-
  Save a new memory learned from the conversation. Only for information worth
  remembering WEEKS later. Ask: 'Would this matter in a month?' If not,
  skip it. User preferences ABOUT fiction are real memories (favorite genre,
  playstyle, characters they love). In-game events are NOT (beat a boss,
  found a location). Transient moods belong in log_mood, not here.
hot: false
parameters:
  type: object
  properties:
    fact:
      type: string
      description: >-
        A clear, single-sentence memory about {{user}}. Must pass the 'next
        month' test: would knowing this improve a conversation 30 days from
        now?
    category:
      type: string
      description: >-
        Category of the memory. Do NOT save transient moods or daily context
        as memories.
      enum:
        - identity
        - relationship
        - health
        - work
        - goal
        - event
        - preference
        - other
    tags:
      type: string
      description: >-
        Comma-separated topic tags for semantic search — describes WHAT this
        memory is about so it surfaces in the right conversations. Example:
        'mental health, burnout, coping, energy' or 'programming, go,
        backend, projects'. Be specific to the memory's topic.
    context:
      type: string
      description: >-
        Optional 1-2 sentence note explaining WHY this memory matters or how
        it connects to other knowledge. Only include when the context isn't
        obvious from the memory itself. Example: 'Primary project language —
        she knows Python/TS but is new to Go. Teaching mode matters.'
  required:
    - fact
    - category
    - tags
trace:
  emoji: "💾"
  format: "{{.fact | escape}}\n    category={{.category}}"
  on_reject:
    prefix: "rejected:"
    emoji: "🚫"
    format: "<i>{{.Result | truncate 120 | escape}}</i>"
