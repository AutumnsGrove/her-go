name: update_fact
hint: "update an existing fact"
description: >-
  Update an existing fact when new information changes or refines what we
  knew. Use this instead of save_fact when a fact already exists but needs
  correction or expansion.
hot: true
parameters:
  type: object
  properties:
    fact_id:
      type: integer
      description: "ID of the fact to update"
    fact:
      type: string
      description: "The updated fact text"
    category:
      type: string
      description: "Updated category. Use 'context' for ephemeral day-to-day info."
      enum:
        - identity
        - relationship
        - health
        - work
        - mood
        - goal
        - event
        - preference
        - context
        - other
    tags:
      type: string
      description: "Updated comma-separated topic tags for semantic search."
    context:
      type: string
      description: >-
        Optional 1-2 sentence note explaining WHY this fact matters or how
        it connects to other knowledge. Only include when the context isn't
        obvious from the fact itself.
  required:
    - fact_id
    - fact
    - category
    - tags
trace:
  emoji: "📝"
  format: "#{{.fact_id}} → {{.fact | escape}}\n    category={{.category}}"
  on_reject:
    prefix: "rejected:"
    emoji: "🚫"
    format: "#{{.fact_id}} <i>{{.Result | truncate 120 | escape}}</i>"
