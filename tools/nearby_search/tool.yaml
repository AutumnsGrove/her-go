name: nearby_search
agent: main
description: >-
  Search for nearby places — restaurants, coffee shops, pharmacies, parks, etc.
  Uses Foursquare Places API for structured results with distance and categories.
  Falls back to web search if Foursquare isn't configured.

  Location resolves automatically: explicit location arg → most recent shared
  location (e.g., a pin drop) → saved home location. You usually don't need
  to pass a location unless {{user}} asks about a different area.

  Results include formatted place cards (name, address, distance, Google Maps
  link) that are automatically appended to your reply — don't try to format
  them yourself. Just describe the results naturally in your reply instruction.

  Can be used proactively when it would genuinely help — if {{user}} mentions
  wanting to do something at a physical place and you know their area, suggest
  a spot. But don't force it. Most conversations don't need a place search.
hot: false
category: context
parameters:
  type: object
  properties:
    query:
      type: string
      description: "What to search for (e.g., 'coffee shop', 'pharmacy', 'bookstore')"
    location:
      type: string
      description: "Optional location to search near. Omit to use the most recent known location."
    radius_km:
      type: number
      description: "Search radius in kilometers (default 5, max 100)"
    limit:
      type: integer
      description: "Max results to return (default 5, max 50)"
  required:
    - query
trace:
  emoji: "📍"
  format: "\"{{.query}}\"{{if .location}} near {{.location | escape}}{{end}} → {{.Result | truncate 80 | escape}}"
