name: remove_memory
agent: memory
description: >-
  Remove one or more memories that are no longer true, incorrect, or redundant.
  Memories are soft-deleted (kept for audit but excluded from retrieval).
  Use memory_id for a single removal, or memory_ids for batch operations.
hot: false
parameters:
  type: object
  properties:
    memory_id:
      type: integer
      description: "ID of a single memory to remove"
    memory_ids:
      type: array
      items:
        type: integer
      description: "Batch: multiple memory IDs to deactivate at once"
    reason:
      type: string
      description: "Brief reason for removal (for logging)"
    replaced_by:
      type: integer
      description: "ID of the newer memory that replaces this one (single-remove only). Creates a supersession chain so we can trace knowledge evolution."
  required:
    - reason
trace:
  emoji: "🗑"
  format: "#{{.memory_id}} — {{.reason | escape}}"
