name: calendar_delete
agent: main
description: >-
  Delete a calendar event by ID. Get the event ID from calendar_list.
  This is a soft delete — the row is preserved in the DB (active=0) for
  audit trail, and the event is removed from Apple Calendar.
hot: false
category: calendar
parameters:
  type: object
  properties:
    event_id:
      type: string
      description: "Event ID from calendar_list. Required."
  required: [event_id]
trace:
  emoji: "🗑️"
  format: "deleted event {{.event_id | truncate 8}}"
