name: save_self_fact
description: >-
  Save a fact about {{her}} herself — her own observations, communication
  patterns, identity, or things she's learned about the relationship dynamic.
  NOT for facts about {{user}}.
hot: false
category: memory
parameters:
  type: object
  properties:
    fact:
      type: string
      description: "A self-observation or identity fact about {{her}}"
    category:
      type: string
      description: "Category of the self-fact"
      enum:
        - identity
        - observation
        - pattern
        - preference
        - relationship_dynamic
    tags:
      type: string
      description: >-
        Comma-separated topic tags for semantic search — describes WHAT this
        self-fact is about. Example: 'identity, communication style,
        authenticity' or 'relationship, boundaries, user dynamic'.
    context:
      type: string
      description: >-
        Optional 1-2 sentence note explaining WHY this self-fact matters or
        how it connects to other knowledge.
  required:
    - fact
    - category
    - tags
trace:
  emoji: "🪞"
  format: "{{.fact | escape}}\n    category={{.category}}"
  on_reject:
    prefix: "rejected:"
    emoji: "🚫"
    format: "<i>{{.Result | truncate 120 | escape}}</i>"
