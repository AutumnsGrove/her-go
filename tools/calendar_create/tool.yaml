name: calendar_create
agent: main
description: >-
  Create one or more calendar events. Also handles work shifts — pass a "job"
  param per event to auto-fill location and position from config, store the
  shift in the DB, and sync to Apple Calendar. Returns event IDs for use with
  calendar_update or calendar_delete.

  When {{user}} pastes a schedule or asks to create events, call get_time first
  to know the current date/timezone, then create events with proper ISO 8601
  timestamps including timezone offsets.
hot: false
category: calendar
parameters:
  type: object
  properties:
    events:
      type: array
      description: "Array of events to create. All succeed or all fail (atomic)."
      items:
        type: object
        properties:
          title:
            type: string
            description: "Event title. Required."
          start:
            type: string
            description: "ISO 8601 with timezone offset. Required."
          end:
            type: string
            description: "ISO 8601 with timezone offset. Required."
          location:
            type: string
            description: "Optional location/address. Auto-filled from config when job is set."
          notes:
            type: string
            description: "Optional freeform notes/description."
          calendar:
            type: string
            description: "Which calendar to create this event in. If omitted, uses default_calendar from config."
          job:
            type: string
            description: "Job name from config (e.g. 'Panera'). Triggers shift behavior — auto-fills location and position. Optional."
          position:
            type: string
            description: "Role/position for this shift (e.g. 'Grill Cook'). Defaults to job's default_role if omitted. Only used when job is set."
          trainer:
            type: string
            description: "Training supervisor name. Optional, only used when job is set."
        required: [title, start, end]
  required: [events]
trace:
  emoji: "➕"
  format: "created {{.events | len}} event(s)"
