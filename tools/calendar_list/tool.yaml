name: calendar_list
agent: main
description: >-
  Read events from the configured calendar in a date range.
  Use when the user asks "what's on my calendar" or for context like
  "am I free Friday afternoon". Returns event IDs that can be used with
  calendar_update or calendar_delete.
hot: false
category: calendar
parameters:
  type: object
  properties:
    start:
      type: string
      description: "ISO 8601 with timezone offset (e.g., '2026-04-20T00:00:00-04:00'). Required."
    end:
      type: string
      description: "ISO 8601 with timezone offset (e.g., '2026-04-27T23:59:59-04:00'). Required."
    calendar:
      type: string
      description: "Optional calendar name override. Defaults to config calendar_name if omitted."
  required: [start, end]
trace:
  emoji: "📅"
  format: "{{.start | truncate 10}} to {{.end | truncate 10}}"
