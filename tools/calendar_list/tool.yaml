name: calendar_list
agent: main
description: >-
  Read events from all configured calendars in a date range. Returns a unified
  timeline with each event tagged with its source calendar. For shift events,
  includes job name and computed scheduled_hours. Returns event IDs for use
  with calendar_update or calendar_delete.

  Use when {{user}} asks "what's on my calendar", "am I free Friday", or
  "what shifts do I have this week." Call get_time first to know the current
  date, then build the date range from there.
hot: false
category: calendar
parameters:
  type: object
  properties:
    start:
      type: string
      description: "ISO 8601 with timezone offset (e.g., '2026-04-20T00:00:00-04:00'). Required."
    end:
      type: string
      description: "ISO 8601 with timezone offset (e.g., '2026-04-27T23:59:59-04:00'). Required."
    job:
      type: string
      description: "Filter to events for this job only (case-sensitive, must match DB value). Optional."
    shifts_only:
      type: boolean
      description: "Only return events that have a job set (shifts). Default false."
  required: [start, end]
trace:
  emoji: "📅"
  format: "{{.start | truncate 10}} to {{.end | truncate 10}}"
