name: save_self_memory
description: >-
  Save an observation about {{her}}'s own behavior or communication patterns —
  things she has learned through conversation, not things already in her system
  prompt. These feed into the dreaming system for persona evolution.

  GOOD: "Used dry humor when {{user}} was frustrated — it broke the tension"
  GOOD: "{{user}} opens up more when asked follow-up questions about her projects"
  BAD: "{{user}} is excited about X" — that is a user memory, use save_memory instead
  BAD: "I am {{her}}" — already in system prompt, not a learned observation
hot: false
parameters:
  type: object
  properties:
    fact:
      type: string
      description: "A self-observation or identity memory about {{her}}"
    category:
      type: string
      description: "Category of the self-memory"
      enum:
        - identity
        - observation
        - pattern
        - preference
        - relationship_dynamic
    tags:
      type: string
      description: >-
        Comma-separated topic tags for semantic search — describes WHAT this
        self-memory is about. Example: 'identity, communication style,
        authenticity' or 'relationship, boundaries, user dynamic'.
    context:
      type: string
      description: >-
        Optional 1-2 sentence note explaining WHY this self-memory matters or
        how it connects to other knowledge.
  required:
    - fact
    - category
    - tags
trace:
  emoji: "🪞"
  format: "{{.fact | escape}}\n    category={{.category}}"
  on_reject:
    prefix: "rejected:"
    emoji: "🚫"
    format: "<i>{{.Result | truncate 120 | escape}}</i>"
