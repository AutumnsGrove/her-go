name: merge_memories
agent: [dream]
description: >-
  Merge multiple redundant memories into one consolidated memory. Provide
  the IDs of memories to merge and the new combined text. All source memories
  will be deactivated and superseded by the new one. Use this when a cluster
  contains overlapping or repetitive information that should be a single
  richer memory.

hot: false

parameters:
  type: object
  properties:
    memory_ids:
      type: array
      items:
        type: integer
      description: IDs of the memories to merge (minimum 2)
    merged_text:
      type: string
      description: >-
        The consolidated memory text combining all sources into one clear,
        timeless fact. Should be richer than any individual source.
    category:
      type: string
      description: Category for the merged memory
    tags:
      type: string
      description: Comma-separated tags for the merged memory
    reason:
      type: string
      description: Brief explanation of why these memories should be merged
  required:
    - memory_ids
    - merged_text
    - category
    - reason

trace:
  emoji: "🔀"
  format: "merged {{len .MemoryIDs}} memories"
