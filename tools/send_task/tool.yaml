name: send_task
agent: [main]
description: >-
  Delegate a task to a background agent. Two targets are available:

  - target "memory" (default): send memory work (cleanup, splits) to the
    background memory agent. Do your research first (recall_memories to find
    duplicates or compound memories), then send a task with all the context.

  - target "worker": send a research, briefing, or email task to the worker agent.
    The worker searches the web/email, writes a report file, and notifies you
    when done. Use for "deep dive on X", "research Y", or "check email" requests.
    Set wait=true to block until the worker finishes and get the summary inline
    (useful when you need the result before replying).
hint: "delegate work to background agents (memory cleanup, research reports)"
hot: true
parameters:
  type: object
  properties:
    target:
      type: string
      enum: [memory, worker]
      description: "Which agent to delegate to. Default: memory."
    wait:
      type: boolean
      description: "Worker only. When true, block until the worker finishes and return its summary as the tool result. Default: false (fire-and-forget)."
    task_type:
      type: string
      description: "Type of task — for memory: cleanup/split/general. For worker: briefing/research/email_check."
    note:
      type: string
      description: "Freeform instructions for the target agent — be specific about what to do"
    memory_ids:
      type: array
      items:
        type: integer
      description: "Relevant memory IDs (memory target only, from recall_memories results)"
  required:
    - task_type
    - note
trace:
  emoji: "📨"
  format: "→ {{.target | default \"memory\"}}: {{.task_type}}{{if .wait}} (wait){{end}}"
