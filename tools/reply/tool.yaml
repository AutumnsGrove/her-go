name: reply
agent: [main]
hint: "generate and send a response (REQUIRED every turn)"
description: >-
  Generate and send a response to the user. REQUIRED — you MUST call this at
  least once per turn. The instruction is a DIRECTIVE to a separate
  conversational model — describe what to say, not the words themselves.

  The chat model has NO memory unless you pass it. Use recall_memories first,
  then pass relevant results in the memories parameter. Without memories, the
  chat model responds with zero knowledge of past conversations.
hot: true
parameters:
  type: object
  properties:
    instruction:
      type: string
      description: >-
        A directive to the conversational model describing what to respond
        about, the tone, and key points. Do NOT write the actual reply text
        — another model generates that. Example: 'Warmly greet the user and
        ask about their day' NOT 'hey! how's your day going?'
    context:
      type: string
      description: >-
        Optional additional context (search results, URL content) to include
        in the prompt.
    memory_ids:
      type: array
      items:
        type: integer
      description: >-
        Memory IDs from recall_memories results. Preferred over memories — the
        full text is looked up automatically, avoiding truncation or paraphrasing.
        Pass the numeric ID from each recall result.
    length:
      type: string
      enum: [brief, normal, detailed]
      description: >-
        How long should this reply be? brief = a sentence or a few words,
        fragments fine. normal = 1-3 sentences. detailed = paragraph-length,
        for emotional depth or complex explanations. Defaults to brief.
    memories:
      type: array
      items:
        type: string
      description: >-
        Fallback: raw memory text strings. Use memory_ids instead when possible.
        Only use this for ad-hoc context that doesn't come from recall_memories.
  required:
    - instruction
trace:
  emoji: "📝"
  format: "<i>{{.instruction | truncate 200 | escape}}</i>"
