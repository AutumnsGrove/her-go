name: reply
agent: main
hint: "generate and send a response (REQUIRED every turn)"
description: >-
  Generate and send a response to the user. REQUIRED — you MUST call this at
  least once per turn. The instruction is a DIRECTIVE to a separate
  conversational model — describe what to say, not the words themselves.

  Before calling reply, use recall_memories to search for relevant facts.
  Pass what you find in the facts parameter — the conversational model will
  have exactly those injected into its context. If nothing is relevant, pass
  an empty list.
hot: true
parameters:
  type: object
  properties:
    instruction:
      type: string
      description: >-
        A directive to the conversational model describing what to respond
        about, the tone, and key points. Do NOT write the actual reply text
        — another model generates that. Example: 'Warmly greet the user and
        ask about their day' NOT 'hey! how's your day going?'
    context:
      type: string
      description: >-
        Optional additional context (search results, URL content) to include
        in the prompt.
    facts:
      type: array
      items:
        type: string
      description: >-
        Facts retrieved via recall_memories that are relevant to this reply.
        The conversational model will have these injected directly into its
        context. Pass the fact text verbatim from recall_memories results.
        Empty list if no facts are relevant.
  required:
    - instruction
trace:
  emoji: "📝"
  format: "<i>{{.instruction | truncate 200 | escape}}</i>"
