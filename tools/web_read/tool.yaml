name: web_read
description: >-
  Extract clean text content from a URL using Tavily. Use when the user
  shares a link and wants you to read it, or when a web_search result
  needs deeper investigation and you want the full page content.
hot: false
category: search
parameters:
  type: object
  properties:
    url:
      type: string
      description: "The full URL to read (must include https://)"
  required:
    - url
trace:
  emoji: "📄"
  format: "{{.url | escape}} → {{.Result | truncate 80 | escape}}"
