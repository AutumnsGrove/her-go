name: github_list_issues
description: >-
  List GitHub issues for a configured repo. Use when {{user}} asks about
  open issues, bugs, feature requests, or what's happening on a project.
hint: "list GitHub issues"
hot: false
category: github
parameters:
  type: object
  properties:
    repo:
      type: string
      description: >-
        Repository in 'owner/repo' format (e.g., 'AutumnsGrove/grove.place').
        Must be in the configured allow-list. Omit to list allowed repos.
    state:
      type: string
      description: "Issue state filter: 'open' (default), 'closed', or 'all'."
      enum:
        - open
        - closed
        - all
    labels:
      type: string
      description: >-
        Comma-separated label names to filter by (e.g., 'bug,urgent').
        Omit for all labels.
    limit:
      type: number
      description: "Max issues to return (default 30, max 100)."
  required: []
trace:
  emoji: "🐙"
  format: "{{.repo | default \"repos\"}}\n    → {{.Result | truncate 80 | escape}}"
