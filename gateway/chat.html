<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>her-go</title>
<style>
  :root { --bg: #1a1a2e; --surface: #16213e; --text: #e0e0e0; --accent: #a78bfa; --muted: #888; --input-bg: #0f3460; --err: #e74c3c; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }
  .chat-col { flex: 2; display: flex; flex-direction: column; border-right: 1px solid #333; }
  .trace-col { flex: 1; display: flex; flex-direction: column; }
  .header { padding: 12px 16px; border-bottom: 1px solid #333; font-size: 14px; font-weight: 600; color: var(--accent); }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: var(--input-bg); border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--surface); border-bottom-left-radius: 4px; }
  .msg.err { color: var(--err); }
  .msg.status { color: var(--muted); font-style: italic; font-size: 13px; }
  .input-row { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #333; }
  .input-row input { flex: 1; background: var(--input-bg); border: 1px solid #444; border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; }
  .input-row input:focus { border-color: var(--accent); }
  .input-row button { background: var(--accent); color: #111; border: none; border-radius: 8px; padding: 10px 18px; font-weight: 600; cursor: pointer; font-size: 14px; }
  .input-row button:disabled { opacity: 0.5; cursor: default; }
  .traces { flex: 1; overflow-y: auto; padding: 12px; font-family: "SF Mono", Menlo, monospace; font-size: 12px; line-height: 1.6; color: var(--muted); white-space: pre-wrap; word-wrap: break-word; }
</style>
</head>
<body>

<div class="chat-col">
  <div class="header">her-go</div>
  <div class="messages" id="messages"></div>
  <div class="input-row">
    <input id="input" type="text" placeholder="say something..." autocomplete="off">
    <button id="send" onclick="sendMessage()">send</button>
  </div>
</div>

<div class="trace-col">
  <div class="header">traces</div>
  <div class="traces" id="traces">waiting for agent activity...</div>
</div>

<script>
const API = window.location.origin;
let convId = null;
let busy = false;

const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const msgBox = document.getElementById('messages');
const traceBox = document.getElementById('traces');

input.addEventListener('keydown', e => { if (e.key === 'Enter' && !busy) sendMessage(); });

function addMsg(text, cls) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  msgBox.appendChild(d);
  msgBox.scrollTop = msgBox.scrollHeight;
  return d;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || busy) return;
  input.value = '';
  addMsg(text, 'user');
  busy = true;
  sendBtn.disabled = true;
  const thinking = addMsg('thinking...', 'status');

  try {
    const payload = { message: text };
    if (convId) payload.conversation_id = convId;
    const resp = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    thinking.remove();
    if (!resp.ok) {
      addMsg('error: ' + resp.status + ' ' + (await resp.text()), 'err');
      return;
    }
    const data = await resp.json();
    convId = data.conversation_id;
    addMsg(data.reply || '(empty reply)', 'bot');
  } catch (e) {
    thinking.remove();
    addMsg('connection error: ' + e.message, 'err');
  } finally {
    busy = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

// SSE trace listener
function connectTraces() {
  const src = new EventSource(API + '/api/traces');
  src.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      const content = (d.Content || '').replace(/<[^>]+>/g, '');
      const line = '[' + (d.Agent||'') + '/' + (d.Phase||'') + '] ' + content;
      traceBox.textContent += '\n' + line;
      // keep last 200 lines
      const lines = traceBox.textContent.split('\n');
      if (lines.length > 200) traceBox.textContent = lines.slice(-150).join('\n');
      traceBox.scrollTop = traceBox.scrollHeight;
    } catch(_) {}
  };
  src.onerror = () => { src.close(); setTimeout(connectTraces, 3000); };
}
connectTraces();
input.focus();
</script>
</body>
</html>
