# her-router — CF Worker config for Telegram webhook routing.
#
# Deploy:  cd worker && npx wrangler deploy
# Secrets: npx wrangler secret put WEBHOOK_SECRET
#
# The WEBHOOK_SECRET must match cfg.Telegram.WebhookSecret in config.yaml.
# It is stored as a Wrangler secret (encrypted, not in this file).

name = "her-router"
main = "index.js"
compatibility_date = "2026-01-01"

# KV namespace for routing state (dev_mode_active, dev_instance_url,
# dev_session_heartbeat). Create with:
#   npx wrangler kv namespace create HER_KV
# then paste the id below.
kv_namespaces = [
  { binding = "HER_KV", id = "REPLACE_WITH_KV_NAMESPACE_ID" }
]

[vars]
# Permanent tunnel URL for the Mac Mini. Set this after creating the
# Cloudflare Tunnel in Phase 3. For quick-start with trycloudflare.com,
# use the assigned URL.
PROD_URL = "https://her.autumnsgrove.com"

# WEBHOOK_SECRET is stored as a Wrangler secret — not here.
# Set it with: npx wrangler secret put WEBHOOK_SECRET
